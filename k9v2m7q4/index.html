<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0e120d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Home Studio BI">
    <title>Home Studio BI - Sheila</title>
    <link rel="manifest" href="../manifest.webmanifest?v=55">
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png?v=55">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png?v=55">
    <link rel="apple-touch-icon" sizes="192x192" href="../assets/icon-192.png?v=55">
    <link rel="apple-touch-icon" sizes="512x512" href="../assets/icon-512.png?v=55">
    <link rel="icon" href="../assets/icon-192.png?v=55" type="image/png">
    <link rel="stylesheet" href="../styles.css?v=55">
    <link rel="stylesheet" href="../attendant.css?v=55">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegação principal">
        <a class="brand" href="#dashboard" aria-label="Home Studio BI">
          <span class="brand-mark" aria-hidden="true"><img src="../assets/icon.svg" alt=""></span>
          <span>Home Studio BI</span>
        </a>
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Recolher barra lateral" aria-expanded="true" title="Recolher barra lateral">
          <span aria-hidden="true"></span>
        </button>
        <nav class="side-nav">
          <button class="nav-item is-active" data-page="dashboard" type="button" aria-label="Dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"></path></svg>
            <span>Dashboard</span>
          </button>
          <button class="nav-item" data-page="transactions" type="button" aria-label="Transações">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6h14v2H5zm0 5h14v2H5zm0 5h14v2H5z"></path></svg>
            <span>Transações</span>
          </button>
          <button class="nav-item" data-page="notifications" type="button" aria-label="Notificações">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22zm7-5-2-2v-5a5 5 0 0 0-10 0v5l-2 2v1h14z"></path></svg>
            <span>Notificações</span>
          </button>
        </nav>
      </aside>

      <main class="main attendant-main">
        <header class="mobile-header">
          <a class="brand" href="#dashboard" aria-label="Home Studio BI">
            <span class="brand-mark" aria-hidden="true"><img src="../assets/icon.svg" alt=""></span>
            <span>Home Studio BI</span>
          </a>
          <span class="sync-pill" id="syncStatus">Carregando</span>
        </header>

        <div class="desktop-sync">
          <span class="sync-pill" id="desktopSyncStatus">Carregando</span>
        </div>

        <section class="control-panel" aria-label="Filtros">
          <div class="period-grid" role="group" aria-label="Período">
            <button class="period-button is-active" data-period="today" type="button">Hoje</button>
            <button class="period-button" data-period="yesterday" type="button">Ontem</button>
            <button class="period-button" data-period="last7" type="button">Últimos 7 dias</button>
            <button class="period-button" data-period="month" type="button">Este mês</button>
            <button class="period-button" data-period="lastMonth" type="button">Mês passado</button>
            <button class="period-button" data-period="custom" type="button">Personalizado</button>
          </div>
          <div class="custom-fields" id="customFields">
            <label>
              <span>Início</span>
              <input id="startDate" type="date">
            </label>
            <label>
              <span>Fim</span>
              <input id="endDate" type="date">
            </label>
          </div>
          <button class="refresh-button" id="refreshButton" type="button">Atualizar</button>
        </section>

        <section class="page is-active" id="page-dashboard" data-page="dashboard">
          <div class="goals-grid" id="goalsList"></div>

          <div class="metrics-grid">
            <article class="metric attendant-total-income">
              <span>Ganhos no período</span>
              <strong id="metricTotalIncome">R$ 0,00</strong>
            </article>
            <article class="metric attendant-commission">
              <span>Comissões</span>
              <strong id="metricCommission">R$ 0,00</strong>
            </article>
            <article class="metric attendant-sales">
              <span>Vendas</span>
              <strong id="metricSales">0</strong>
            </article>
            <article class="metric attendant-fixed">
              <span>Fixo recebido</span>
              <strong id="metricFixed">R$ 0,00</strong>
            </article>
            <article class="metric attendant-rate">
              <span>Comissão atual</span>
              <strong id="metricRate">0,0%</strong>
            </article>
          </div>

          <article class="panel chart-panel attendant-chart-panel">
            <div class="panel-header">
              <h1 id="salesChartTitle">Vendas por horário</h1>
              <span class="period-label" id="salesChartPeriod">Hoje</span>
            </div>
            <div class="line-chart-wrap">
              <svg class="line-chart" id="salesChart" viewBox="0 0 980 330" preserveAspectRatio="xMidYMid meet" aria-label="Gráfico de vendas"></svg>
              <div class="chart-tooltip" id="chartTooltip" hidden></div>
            </div>
          </article>
          <article class="panel chart-panel attendant-chart-panel">
            <div class="panel-header">
              <h1>Vendas por dia</h1>
              <span class="period-label" id="dailySalesChartPeriod">Este mês</span>
            </div>
            <div class="line-chart-wrap">
              <svg class="line-chart" id="dailySalesChart" viewBox="0 0 980 330" preserveAspectRatio="xMidYMid meet" aria-label="Gráfico de vendas por dia"></svg>
              <div class="chart-tooltip" id="dailyChartTooltip" hidden></div>
            </div>
          </article>
        </section>

        <section class="page" id="page-transactions" data-page="transactions">
          <article class="panel transactions-panel">
            <div class="transactions-head">
              <h1>Transações</h1>
              <input id="transactionSearch" type="search" placeholder="Buscar por pagador ou valor" aria-label="Buscar transações">
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Pagador</th>
                    <th>Valor</th>
                  </tr>
                </thead>
                <tbody id="transactionsBody"></tbody>
              </table>
            </div>
            <div class="pager">
              <button id="prevPage" type="button">Anterior</button>
              <span id="pageInfo">Página 1 de 1</span>
              <button id="nextPage" type="button">Próxima</button>
            </div>
          </article>
        </section>

        <section class="page" id="page-notifications" data-page="notifications">
          <article class="panel notifications-panel">
            <h1>Notificações</h1>
            <div class="notification-list notification-simple">
              <label class="notification-row">
                <span>Notificações de venda</span>
                <span class="switch">
                  <input type="checkbox" id="saleNotifications">
                  <span class="slider"></span>
                </span>
              </label>
            </div>
            <button class="test-notification" id="testNotification" type="button">Testar notificação</button>
          </article>
        </section>
      </main>

      <nav class="bottom-nav attendant-bottom-nav" aria-label="Navegação mobile">
        <button class="bottom-item is-active" data-page="dashboard" type="button" aria-label="Dashboard">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"></path></svg>
          <span>Dashboard</span>
        </button>
        <button class="bottom-item" data-page="transactions" type="button" aria-label="Transações">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6h14v2H5zm0 5h14v2H5zm0 5h14v2H5z"></path></svg>
          <span>Transações</span>
        </button>
        <button class="bottom-item" data-page="notifications" type="button" aria-label="Notificações">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22zm7-5-2-2v-5a5 5 0 0 0-10 0v5l-2 2v1h14z"></path></svg>
          <span>Notificações</span>
        </button>
      </nav>
    </div>
    <script src="../config.js?v=55"></script>
    <script src="../push-client.js?v=55"></script>
    <script>
      window.HSBI_ATTENDANT_CONFIG = { slug: "k9v2m7q4", name: "Sheila" };
    </script>
    <script src="../attendant.js?v=55"></script>
  </body>
</html>
